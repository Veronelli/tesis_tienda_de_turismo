<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/x-icon" href="img/logo.png">
  <title>Consultar Paquete — Tienda De Turismo</title>
  <link rel="stylesheet" href="dashboard/css/style.css">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0ebe5;
      color: #1a1a2e;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      height: 52px;
      z-index: 120;
      display: flex;
      align-items: center;
      justify-content: flex-start;
      gap: 12px;
      padding: 0 14px;
      background: #fbf3e5;
      border-bottom: 1px solid rgba(26, 26, 46, 0.06);
    }

    .topbar__left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .topbar__title {
      margin: 0;
      color: #1a1a2e;
      font-size: 1.45rem;
      font-weight: 500;
      line-height: 1;
    }

    .topbar__logo {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #1a1a2e;
      font-size: 0.42rem;
      font-weight: 700;
      text-align: center;
      line-height: 0.85;
    }

    .page-wrap {
      max-width: 820px;
      margin: 0 auto;
      padding: 68px 16px 48px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.82rem;
      color: #78716c;
      text-decoration: none;
      margin-bottom: 18px;
      transition: color 0.15s;
    }
    .back-link:hover { color: #ff7c00; }

    .pkg-detail-section {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
    }

    .detail-card {
      background: #fff;
      border: 1px solid #d5dde5;
      border-radius: 8px;
      overflow: hidden;
    }

    .detail-card__img {
      width: 100%;
      height: 200px;
      background: #f0ebe5;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #78716c;
      font-size: 0.75rem;
      overflow: hidden;
    }
    .detail-card__img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .detail-card__img .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      opacity: 0.5;
    }

    .detail-card__body { padding: 20px; }

    .detail-card__body .name {
      font-size: 1.1rem;
      font-weight: 700;
      color: #1a1a2e;
    }

    .detail-card__body .desc {
      font-size: 0.82rem;
      color: #78716c;
      margin-top: 10px;
      line-height: 1.6;
    }

    .detail-card__body .info-row {
      display: flex;
      justify-content: space-between;
      padding: 8px 0;
      border-bottom: 1px solid #f0ebe5;
      font-size: 0.85rem;
    }
    .detail-card__body .info-row:last-of-type { border-bottom: none; }
    .detail-card__body .info-row .label { color: #78716c; }
    .detail-card__body .info-row .value { font-weight: 600; color: #1a1a2e; }

    .detail-card__body .price {
      font-size: 1.3rem;
      font-weight: 700;
      color: #ff7c00;
      margin-top: 14px;
    }

    .form-card {
      background: #fff;
      border: 1px solid #d5dde5;
      border-radius: 8px;
      padding: 24px;
    }

    .form-card h3 {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a2e;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

  <header class="topbar">
    <div class="topbar__left">
      <img src="img/logo.png" alt=""class="topbar__logo">
    </div>
    <h1 class="topbar__title">Tienda de Turismo</h1>
  </header>

<div class="page-wrap">

  <a href="buscar-paquetes.html" class="back-link">&larr; Volver a paquetes</a>

  <div class="pkg-detail-section">

    <!-- Package Detail -->
    <div class="detail-card" id="detalle-paquete">
      <div class="loading" id="loading-detalle">
        <div class="spinner"></div>
        Cargando paquete...
      </div>
    </div>

    <!-- Consultation Form -->
    <div class="form-card">
      <h3>Consultar este paquete</h3>
      <form id="form-consulta" onsubmit="return enviarConsulta(event)">
        <div class="form-group">
          <label for="nombre">Nombre *</label>
          <input type="text" id="nombre" class="form-control" placeholder="Tu nombre" required maxlength="100">
        </div>
        <div class="form-group">
          <label for="apellido">Apellido *</label>
          <input type="text" id="apellido" class="form-control" placeholder="Tu apellido" required maxlength="100">
        </div>
        <div class="form-group">
          <label for="dni">DNI *</label>
          <input type="text" id="dni" class="form-control" placeholder="Ej: 12345678" required maxlength="20">
        </div>
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" class="form-control" placeholder="tucorreo@ejemplo.com" required maxlength="200">
        </div>
        <div class="form-group">
          <label for="telefono">Teléfono *</label>
          <input type="tel" id="telefono" class="form-control" placeholder="Ej: 11 1234 5678" required maxlength="30">
        </div>
        <div class="form-group">
          <label for="ubicacion">Ubicación</label>
          <input type="text" id="ubicacion" class="form-control" placeholder="Ej: CABA, Buenos Aires" maxlength="200">
        </div>
        <div class="form-group">
          <label for="mensaje">Mensaje *</label>
          <textarea id="mensaje" class="form-control" placeholder="Contanos qué te interesa saber sobre este paquete..." required maxlength="2000" style="min-height:100px;"></textarea>
        </div>
        <div id="error-consulta" style="color:#ef4444;font-size:0.83rem;margin-bottom:12px;display:none;"></div>
        <button type="submit" class="btn btn-primary" id="btn-enviar" style="width:100%;justify-content:center;padding:10px;">
          Enviar consulta
        </button>
      </form>
    </div>

  </div>

</div>

<script>
  const API_BASE = (() => {
    const p = window.location.pathname;
    const i = p.lastIndexOf('/');
    return p.substring(0, i) + '/api';
  })();

  const paqueteId = new URLSearchParams(window.location.search).get('id');

  function escapeHtml(text) {
    if (!text) return '';
    const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
    return String(text).replace(/[&<>"']/g, c => map[c]);
  }

  function resolverImagenSrc(valor) {
    if (!valor) return '';
    if (valor.startsWith('data:') || valor.startsWith('http://') || valor.startsWith('https://')) {
      return valor;
    }
    return API_BASE.replace('/api', '') + valor;
  }

  function imagenPlaceholder() {
    return '<div class="placeholder">' +
      '<svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">' +
      '<rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/>' +
      '</svg><span>Sin imagen</span></div>';
  }

  function renderPaquete(p) {
    const imgUrl = resolverImagenSrc(p.imagen_principal || '');
    const imgHtml = imgUrl
      ? '<img src="' + imgUrl + '" alt="' + escapeHtml(p.nombre) + '">'
      : imagenPlaceholder();

    const hoteles = Array.isArray(p.hoteles) && p.hoteles.length
      ? p.hoteles.map(h => h.nombre).filter(Boolean).join(', ')
      : (p.hotel_nombre || 'Hotel no informado');

    const fechas = (p.fecha_partida || '') + (p.fecha_vuelta ? ' → ' + p.fecha_vuelta : '');
    const precio = Number(p.precio).toLocaleString('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

    document.getElementById('detalle-paquete').innerHTML =
      '<div class="detail-card__img">' + imgHtml + '</div>' +
      '<div class="detail-card__body">' +
      '<div class="name">' + escapeHtml(p.nombre) + '</div>' +
      (p.descripcion ? '<div class="desc">' + escapeHtml(p.descripcion) + '</div>' : '') +
      '<div class="info-row"><span class="label">Hotel</span><span class="value">' + escapeHtml(hoteles) + '</span></div>' +
      '<div class="info-row"><span class="label">Fechas</span><span class="value">' + escapeHtml(fechas) + '</span></div>' +
      '<div class="price">$ ' + precio + '</div>' +
      '</div>';
  }

  async function cargarPaquete() {
    const loading = document.getElementById('loading-detalle');
    loading.style.display = 'flex';
    try {
      const res = await fetch(API_BASE + '/paquetes/' + paqueteId);
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al cargar el paquete');
      loading.style.display = 'none';
      renderPaquete(data);
    } catch (e) {
      loading.style.display = 'none';
      document.getElementById('detalle-paquete').innerHTML =
        '<div class="empty-state" style="padding:40px;text-align:center;color:#78716c;">Error: ' + escapeHtml(e.message) + '</div>';
    }
  }

  async function enviarConsulta(e) {
    e.preventDefault();
    const errorEl = document.getElementById('error-consulta');
    errorEl.style.display = 'none';

    const nombre = document.getElementById('nombre').value.trim();
    const apellido = document.getElementById('apellido').value.trim();
    const dni = document.getElementById('dni').value.trim();
    const email = document.getElementById('email').value.trim();
    const telefono = document.getElementById('telefono').value.trim();
    const ubicacion = document.getElementById('ubicacion').value.trim();
    const mensaje = document.getElementById('mensaje').value.trim();

    if (!paqueteId) {
      errorEl.textContent = 'No se identificó el paquete.';
      errorEl.style.display = 'block';
      return;
    }

    if (!dni) {
      errorEl.textContent = 'El DNI es obligatorio.';
      errorEl.style.display = 'block';
      return;
    }

    const btn = document.getElementById('btn-enviar');
    btn.disabled = true;
    btn.textContent = 'Enviando...';

    const payload = {
      paquete_id: parseInt(paqueteId, 10),
      mensaje: mensaje,
      nombre: nombre,
      apellido: apellido,
      dni: dni,
      email: email,
      telefono: telefono,
      ubicacion: ubicacion
    };
    console.log('Enviando consulta:', payload);

    try {
      const res = await fetch(API_BASE + '/consultas', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Error al enviar la consulta');
      window.location.href = 'consulta-enviada.html?id=' + paqueteId;
    } catch (e) {
      errorEl.textContent = e.message;
      errorEl.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Enviar consulta';
    }
  }

  if (paqueteId) {
    cargarPaquete();
  } else {
    document.getElementById('detalle-paquete').innerHTML =
      '<div class="empty-state" style="padding:40px;text-align:center;color:#78716c;">No se especificó un paquete.</div>';
  }
</script>

</body>
</html>
