<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ingresar — Tienda De Turismo Admin</title>
  <link rel="icon" type="image/x-icon" href="../img/logo.png">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="login-page">
  <div class="login-card">
    <div class="brand">
      <h1>Tienda De Turismo</h1>
      <p>Panel de administración</p>
    </div>
    <div class="login-error" id="login-error"></div>
    <form onsubmit="handleLogin(event)">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" class="form-control" placeholder="admin@ejemplo.com" required autocomplete="email">
      </div>
      <div class="form-group">
        <label for="contrasena">Contraseña</label>
        <input type="password" id="contrasena" name="contrasena" class="form-control" placeholder="••••••••" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn btn-primary">Ingresar</button>
    </form>
  </div>
</div>
<script src="js/auth.js"></script>
<script src="js/app.js"></script>
</body>
</html>
